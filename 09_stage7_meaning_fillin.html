<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 6: Definition Completion</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .stage6-card {
      padding: 3rem 2.5rem;
      max-width: 800px;
      margin: auto;
      background: rgba(255, 255, 255, 0.25) !important;
      backdrop-filter: blur(15px) !important;
      border: 2px solid rgba(0, 0, 0, 0.2) !important;
      border-radius: 24px !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15) !important;
    }

    .s6-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }

    .s6-header h2 {
      margin: 0;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 1px;
    }

    .alarming-timer {
      font-size: 2.2rem;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
      color: var(--accent-primary);
      background: rgba(255, 255, 255, 0.4);
      padding: 0.8rem 1.5rem;
      border-radius: 12px;
      border: 2px solid rgba(0, 0, 0, 0.1);
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
    }

    .revision-list {
      max-height: 50vh;
      overflow-y: auto;
      margin-bottom: 2.5rem;
      text-align: left;
      padding-right: 1.5rem;
      scrollbar-width: thin;
      scrollbar-color: var(--accent-primary) rgba(255, 255, 255, 0.2);
    }

    .revision-item {
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      background: rgba(255, 255, 255, 0.3);
      border-left: 6px solid var(--accent-primary);
      border-radius: 12px;
      transition: all 0.2s ease;
    }

    .revision-item strong {
      display: block;
      font-size: 1.8rem;
      margin-bottom: 0.5rem;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .revision-item p {
      margin: 0;
      font-size: 1.2rem;
      font-style: italic;
      color: var(--accent-primary);
      line-height: 1.6;
    }

    .highlight-word {
      font-size: 3rem;
      color: var(--text-main);
      text-align: center;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-bottom: 2.5rem;
      border-bottom: 2px solid var(--accent-primary);
      display: inline-block;
      padding-bottom: 0.5rem;
      font-weight: 800;
    }

    .meaning-fill-area {
      font-size: 1.6rem;
      line-height: 2.4;
      text-align: justify;
      color: var(--text-main);
      padding: 2rem;
      background: rgba(255, 255, 255, 0.3);
      border-radius: 20px;
      border: 2px solid rgba(0, 0, 0, 0.1);
    }

    .meaning-input {
      font-size: 1.6rem;
      font-family: inherit;
      text-align: center;
      font-weight: 800;
      color: var(--accent-primary);
      border: 2px solid rgba(0, 0, 0, 0.1);
      background: #ffffff;
      border-radius: 8px;
      margin: 0 0.4rem;
      padding: 0.2rem 0.8rem;
      transition: all 0.3s ease;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
      min-width: 120px;
    }

    .meaning-input:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 15px rgba(79, 70, 229, 0.2);
    }

    .meaning-input.wrong {
      background: #ffebee;
      border-color: #c62828;
      color: #c62828;
      animation: shake 0.4s ease;
    }

    .meaning-input.correct {
      background: #e8f5e9;
      border-color: #2e7d32;
      color: #2e7d32;
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-4px); }
      75% { transform: translateX(4px); }
    }

    .feedback {
      height: 2.5rem;
      font-weight: 700;
      margin-top: 1.5rem;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feedback.success { color: #2e7d32; }
    .feedback.error { color: #c62828; }

    @media (max-width: 480px) {
      .stage6-card { padding: 2rem 1.25rem; }
      .highlight-word { font-size: 2rem; }
      .meaning-fill-area { font-size: 1.2rem; line-height: 2; padding: 1.5rem; }
      .meaning-input { font-size: 1.2rem; min-width: 80px; }
      .revision-item strong { font-size: 1.4rem; }
      .revision-item p { font-size: 1.1rem; }
    }

    /* Scoreboard & Floating Text */


    .floating-point {
      position: absolute;
      color: #4caf50;
      font-weight: bold;
      font-family: monospace;
      font-size: 2rem;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 200;
      text-shadow: 1px 1px 2px #000;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1.5);
      }

      100% {
        opacity: 0;
        transform: translateY(-50px) scale(1);
      }
    }

    .final-stage-banner {
      position: fixed;
      top: 30%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      background: linear-gradient(135deg, #FFD700, #FF8C00);
      color: #fff;
      padding: 1.5rem 3rem;
      border-radius: 50px;
      font-size: 2.5rem;
      font-weight: 800;
      box-shadow: 0 10px 30px rgba(255, 140, 0, 0.4);
      z-index: 10000;
      text-transform: uppercase;
      text-align: center;
      pointer-events: none;
      animation: popBanner 3.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      border: 4px solid #fff;
    }

    @keyframes popBanner {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      15% { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
      25% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      80% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -150%) scale(0.5); opacity: 0; }
    }
  </style>
</head>

<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">

    <div class="card stage6-card" id="loading-container">
      <h2 style="text-align:center;">Preparing Stage 6...</h2>
      <div style="text-align:center;"><span class="spinner"></span></div>
    </div>

    <!-- Revision Container -->
    <div id="revision-container" class="card stage6-card parchment-large" style="display: none;">
      <div class="s6-header">
        <h2>Stage 6: Definition Completion</h2>
        <div id="rev-timer" class="alarming-timer">00:00</div>
      </div>
      <p style="font-style:italic; margin-bottom:1rem; font-size: 1.2rem;">Commit the exact phrasing of these
        definitions to your memory.</p>
      <div id="rev-list" class="revision-list"></div>
      <button id="start-test-btn" class="classic-btn secondary" style="width:auto; float:right;">Proceed</button>
      <div style="clear:both;"></div>
    </div>

    <!-- Mastery Test Container -->
    <div id="test-container" class="card stage6-card parchment-large" style="display: none;">
      <div class="s6-header">
        <h2>Stage 6: Definition Completion</h2>
        <div id="test-progress" style="font-size:1.5rem; font-weight:bold;">1/10</div>
      </div>
      <p style="font-style:italic; margin-bottom:2rem; text-align:center;">Fill in the missing key terminology within
        the definition.</p>

      <div style="text-align:center;">
        <h1 id="test-word" class="highlight-word">WORD</h1>
      </div>
      <div id="test-meaning-container" class="meaning-fill-area"></div>

      <div id="test-feedback" class="feedback" style="margin-top:2rem;"></div>

      <div style="display:flex; justify-content:space-between; margin-top:1rem;">
        <button id="skip-btn" class="classic-btn secondary" style="width:48%;">Skip / Forfeit (0 pts)</button>
        <button id="submit-btn" class="classic-btn blue-gradient" style="width:48%;">Continue</button>
      </div>
    </div>

  </div>
  <script src="core_dictionary.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="09_stage7_meaning_fillin.js"></script>
</body>

</html>
