<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Multiplayer Lobby</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .app-container {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
    }

    .card {
      position: relative;
      background: rgba(255, 255, 255, 0.2) !important;
      backdrop-filter: blur(20px) !important;
      -webkit-backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.4) !important;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1), inset 0 1px 0 rgba(255, 255, 255, 0.3) !important;
      border-radius: 24px !important;
      padding: 3rem 2rem !important;
      max-width: 500px;
      width: 100%;
      text-align: center;
    }

    .lobby-header { margin-bottom: 2rem; }
    .room-code-display {
      font-size: 2.8rem;
      font-weight: 800;
      letter-spacing: 6px;
      color: var(--accent-primary);
      margin: 1.5rem 0;
      font-family: 'Courier New', monospace;
      text-shadow: 0 2px 10px rgba(79, 70, 229, 0.2);
    }
    .player-list {
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.3);
      border-radius: 16px;
      padding: 1rem;
      margin: 1.5rem 0;
      text-align: left;
      max-height: 300px;
      overflow-y: auto;
    }
    .player-entry {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0.75rem;
      border-bottom: 1px solid rgba(0,0,0,0.05);
    }
    .player-entry:last-child { border-bottom: none; }
    .player-name { font-weight: 600; color: var(--text-main); }
    .player-status { font-size: 0.8rem; text-transform: uppercase; color: var(--accent-primary); font-weight: 800; }
    
    .mode-toggle { display: flex; gap: 1rem; margin-bottom: 2rem; }
    .mode-btn { flex: 1; padding: 1rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.4); background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); cursor: pointer; transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); font-weight: 600; color: var(--text-main); }
    .mode-btn:hover { transform: translateY(-2px); background: rgba(255,255,255,0.4); }
    .mode-btn.active { background: var(--accent-primary); color: #fff; border-color: var(--accent-primary); box-shadow: 0 4px 15px rgba(79, 70, 229, 0.3); }
    
    #join-section { display: none; }
    
    input {
      background: rgba(255, 255, 255, 0.5) !important;
      border: 1px solid rgba(255, 255, 255, 0.6) !important;
      backdrop-filter: blur(5px);
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="card">
      <div class="lobby-header">
        <h1 class="logo" style="font-size: 2rem;">MULTIPLAYER</h1>
        <p style="color: var(--text-secondary);">Team up with your friends</p>
      </div>

      <div class="mode-toggle">
        <button id="mode-host" class="mode-btn active">Host Game</button>
        <button id="mode-join" class="mode-btn">Join Game</button>
      </div>

      <!-- HOST SECTION -->
      <div id="host-section">
        <h3>Room Code</h3>
        <div class="room-code-display" id="room-id">------</div>
        <p style="font-size: 0.9rem; margin-bottom: 1rem;">Share this code with your teammates.</p>
        
        <div class="player-list">
          <div class="player-entry">
            <span class="player-name" id="host-player-name">You</span>
            <span class="player-status">Host</span>
          </div>
          <div id="extra-players">
             <p style="text-align: center; color: var(--text-secondary); font-size: 0.85rem; padding: 1rem;">Waiting for players...</p>
          </div>
        </div>

        <button id="start-multi-btn" class="classic-btn primary" disabled>Awaiting Connections...</button>
      </div>

      <!-- JOIN SECTION -->
      <div id="join-section">
        <h3>Enter Code</h3>
        <input type="text" id="join-code-input" placeholder="000000" maxlength="6" style="text-transform: uppercase;">
        <button id="confirm-join-btn" class="classic-btn primary">Establish Link</button>
      </div>

      <button onclick="window.location.href='01_home_menu.html'" class="classic-btn outline">Back to Menu</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="multiplayer_lobby.js"></script>
</body>
</html>
