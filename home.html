<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Home</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .menu-buttons { display: flex; flex-direction: column; gap: 1rem; margin-top: 2rem; }
  </style>
    <style>
      .akwaaba-header {
        font-family: var(--font-serif);
        font-size: 2.8rem;
        color: var(--ink);
        text-transform: uppercase;
        letter-spacing: 3px;
        margin-bottom: 2rem;
        border-bottom: 2px dashed var(--ink-light);
        padding-bottom: 1rem;
      }
      .akwaaba-header span {
        color: var(--gold);
        text-shadow: 1px 1px 0px rgba(0,0,0,0.8);
      }
    </style>
</head>
<body>
  <div class="app-container">
    <div class="card parchment-large" style="text-align: center;">
      <h2 class="akwaaba-header">AKWAABA, <span id="home-username">Scholar</span></h2>
      <p style="margin-bottom: 2rem; color: var(--ink-light); font-style: italic;">Select your pursuit.</p>
      <div class="menu-buttons">
        <button id="play-solo-btn" class="classic-btn primary">Play Solo</button>
        <button id="play-friend-btn" class="classic-btn secondary" style="opacity: 0.8;">Play vs Friend <br><span style="font-size:0.9rem; font-style:italic; font-weight:normal;">(Coming Soon: Still in development)</span></button>
        <button id="profile-btn" class="classic-btn secondary">View Profile</button>
        <button id="library-btn" class="classic-btn outline">Dictionary Library</button>
        <button id="about-btn" class="classic-btn outline">About / Settings</button>
      </div>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="home.js"></script>
</body>
</html>
