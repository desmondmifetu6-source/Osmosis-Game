<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 1: Word Selection</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .stage2-container { max-width: 1200px; margin: auto; padding: 2.5rem; }
    
    .s2-header { 
      display: flex; 
      justify-content: space-between; 
      align-items: center; 
      gap: 1.5rem;
      border-bottom: 1px solid rgba(255,255,255,0.3); 
      padding-bottom: 1.5rem; 
      margin-bottom: 2rem; 
    }
    
    .s2-target-info { font-size: 1.5rem; color: var(--text-main); line-height: 1.4; }
    .s2-counter { 
      font-size: 1.1rem; 
      font-weight: 700; 
      background: rgba(255, 255, 255, 0.6); 
      backdrop-filter: blur(5px);
      color: var(--text-main); 
      padding: 1rem 1.5rem; 
      border-radius: 16px; 
      text-align: center;
      border: 2px solid var(--accent-primary);
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }
    
    .s2-workspace { display: flex; flex-direction: row; gap: 2.5rem; align-items: stretch; min-height: 450px; }
    
    .word-pool-container { flex: 1.2; display: flex; flex-direction: column; }
    .word-pool-title { 
      font-size: 1.4rem; 
      margin-bottom: 1.25rem; 
      color: var(--text-main); 
      text-align: center; 
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      opacity: 0.8;
    }
    
    .word-pool { 
      flex: 1; 
      display: flex; 
      flex-wrap: wrap; 
      align-items: flex-start; 
      align-content: flex-start; 
      gap: 15px; 
      justify-content: center; 
      padding: 1.5rem; 
      border: 2px solid rgba(0, 0, 0, 0.15); 
      border-radius: 20px; 
      background: rgba(255, 255, 255, 0.4); 
      backdrop-filter: blur(10px);
      box-shadow: inset 0 2px 10px rgba(0,0,0,0.05); 
    }
    
    .wooden-board-container { flex: 0.8; display: flex; flex-direction: column; }
    .wooden-board {
      flex: 1;
      background: rgba(255, 255, 255, 0.3);
      backdrop-filter: blur(12px);
      border: 2px solid var(--accent-primary);
      border-radius: 24px;
      padding: 2rem;
      box-shadow: 0 10px 30px rgba(0,0,0,0.15);
      position: relative;
      overflow: hidden;
    }
    
    .wooden-board::before {
      content: "";
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 100%);
      pointer-events: none;
    }
    
    @media (max-width: 992px) {
      .s2-workspace { flex-direction: column; min-height: auto; }
      .wooden-board { min-height: 250px; }
    }
    
    @media (max-width: 480px) {
      .stage2-container { padding: 1rem 0.5rem; }
      .s2-target-info { font-size: 1rem; }
      #s2-letter { font-size: 1.3rem !important; }
      .s2-counter { font-size: 0.85rem; padding: 0.6rem; border-radius: 12px; }
      .word-tile { font-size: 0.95rem; padding: 0.5rem 0.8rem; border-radius: 8px; }
      .pasted-word { font-size: 0.9rem; }
      .word-pool { padding: 1rem; gap: 10px; }
      .s2-workspace { gap: 1.5rem; }
    }
    
    .board-title { 
      color: var(--text-main); 
      text-align: center; 
      margin-bottom: 1.5rem; 
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.6;
    }
    
    .pasted-words-container { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; position: relative; z-index: 2; }
    
    .word-tile {
      display: inline-block;
      background: #ffffff;
      backdrop-filter: blur(5px);
      color: var(--text-main);
      padding: 0.6rem 1.2rem;
      border: 2px solid rgba(0, 0, 0, 0.1);
      border-radius: 12px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      cursor: pointer;
      font-family: var(--font-main);
      font-size: 1.15rem;
      font-weight: 700;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      position: relative;
      z-index: 2;
      max-width: 100%;
      white-space: nowrap;
      text-align: center;
    }
    
    .word-tile:hover { 
      transform: translateY(-5px) scale(1.05); 
      background: #ffffff;
      box-shadow: 0 12px 24px rgba(0,0,0,0.12); 
      border-color: var(--accent-primary);
      z-index: 10; 
    }
    
    .word-tile.wrong { animation: glowWrong 0.5s ease; }
    @keyframes glowWrong {
      0% { border-color: red; background: rgba(255,0,0,0.1); transform: translateX(0); }
      25% { transform: translateX(-5px); }
      50% { transform: translateX(5px); }
      75% { transform: translateX(-5px); }
      100% { border-color: rgba(255,255,255,0.8); transform: translateX(0); }
    }
    
    .word-tile.highlighted-target {
      border: 3px solid #ffc107;
      box-shadow: 0 0 25px rgba(255, 193, 7, 0.4);
      animation: featuredGlow 2s ease-in-out infinite;
    }
    
    @keyframes featuredGlow {
      0%, 100% { transform: scale(1); box-shadow: 0 0 15px rgba(255, 193, 7, 0.2); }
      50% { transform: scale(1.05); box-shadow: 0 0 25px rgba(255, 193, 7, 0.5); }
    }
    
    .pasted-word {
      background: #ffffff;
      border: 1px solid var(--accent-primary);
      color: var(--accent-primary);
      animation: pasteIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
      box-shadow: 0 8px 20px rgba(79, 70, 229, 0.15);
      cursor: default;
    }
    
    @keyframes pasteIn {
      0% { opacity: 0; transform: scale(0.5) translateY(20px) rotate(-15deg); }
      100% { opacity: 1; transform: scale(1) translateY(0) rotate(var(--rot)); }
    }

    .floating-point { position: fixed; color: #ffeb3b; font-size: 3rem; font-weight: 900; font-family: 'Courier New', monospace; text-shadow: 0 0 10px #000, 2px 2px 0 #000; pointer-events: none; z-index: 10000; animation: floatUp 1s ease-out forwards; }
    @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1.5); } 100% { opacity: 0; transform: translateY(-80px) scale(1); } }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
    <div id="main-container" class="card stage2-container">
       <h2 style="text-align: left; margin-top: 0; margin-bottom: 1rem;">Stage 1: Word Selection</h2>
       <div class="s2-header" style="justify-content: flex-end; border-bottom: none; padding-bottom: 0; margin-bottom: 1rem;">
         <div class="s2-counter" style="padding: 0.5rem 1rem;">
            <span style="font-size:1rem; opacity:0.9; font-weight:600;">Campaign Progress: <span id="s2-progress">1</span>/26</span>
          </div>
       </div>
       
       <div class="s2-workspace">
          <div class="word-pool-container">
            <h3 class="word-pool-title">Available Words</h3>
            <div class="word-pool" id="word-pool">
              <!-- Render words here -->
            </div>
          </div>
          
          <div class="wooden-board-container">
            <div class="wooden-board" id="wooden-board">
               <h3 class="board-title">Your Collection</h3>
               <div class="pasted-words-container" id="pasted-words"></div>
            </div>
          </div>
       </div>
       
       <div style="display:flex; justify-content:space-between; margin-top:2rem;">
          <button id="s2-skip-btn" class="classic-btn secondary" style="width:48%;">Enough Words (Finish Selection)</button>
          <button id="s2-finish-btn" class="classic-btn" style="width:48%;" disabled>Continue</button>
       </div>
    </div>
  </div>
  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="core_dictionary.js"></script>
  <script src="03_stage1_word_selection.js"></script>
</body>
</html>
