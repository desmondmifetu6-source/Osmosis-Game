<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 1</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .stage1-board {
      background: var(--surface-white);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 12px;
      padding: 1.5rem;
      color: var(--text-main);
      max-width: 450px;
      margin: auto;
    }
    .stage1-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px dashed var(--accent-primary);
      padding-bottom: 1rem;
      margin-bottom: 1rem;
    }
    .target-display {
      font-size: 1.8rem;
      color: var(--text-main);
    }
    .target-display strong {
      color: var(--accent-primary);
      font-size: 2.2rem;
    }
    .timer-display {
      font-size: 1.5rem;
      font-weight: bold;
      background: var(--surface-dim);
      padding: 0.5rem 1rem;
      border-radius: 5px;
      border: 1px solid rgba(0,0,0,0.1);
      color: var(--text-main);
    }
    .instruction-text {
      font-style: italic;
      margin-bottom: 1.5rem;
      text-align: center;
      color: var(--text-secondary);
    }
    .plank-column {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      max-height: 55vh;
      overflow-y: auto;
      padding-right: 0.8rem;
    }
    .plank-column::-webkit-scrollbar { width: 8px; }
    .plank-column::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); border-radius: 4px; }
    .plank-column::-webkit-scrollbar-thumb { background: var(--accent-primary); border-radius: 4px; }

    .wooden-plank {
      background: var(--surface-dim);
      border: 1px solid rgba(0,0,0,0.1);
      border-radius: 6px;
      padding: 1rem;
      text-align: center;
      font-size: 2rem;
      font-weight: bold;
      color: var(--text-main);
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      display: flex;
      justify-content: center;
      align-items: center;
    }
    
    .wooden-plank:hover {
      transform: scale(1.03);
      border-color: var(--accent-primary);
      color: var(--accent-primary);
      background: var(--surface-white);
      z-index: 2;
    }
    
    /* Animations */
    .plank-correct {
      background: var(--bg-light) !important;
      border-color: #1b5e20 !important;
      box-shadow: 0 0 20px #4caf50 !important;
      animation: pop 0.4s ease;
      color: #ffffff !important;
    }
    .plank-wrong {
      background: var(--bg-light) !important;
      border-color: #880e4f !important;
      box-shadow: 0 0 20px #f44336 !important;
      animation: shake 0.4s ease;
      color: #ffffff !important;
    }

    @keyframes pop {
      0% { transform: scale(1); }
      50% { transform: scale(1.15); }
      100% { transform: scale(1); }
    }
    @keyframes shake {
      0% { transform: translateX(0); }
      20% { transform: translateX(-8px); }
      40% { transform: translateX(8px); }
      60% { transform: translateX(-8px); }
      80% { transform: translateX(8px); }
      100% { transform: translateX(0); }
    }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="card stage1-board">
      <div class="stage1-header">
         <div class="target-display">Your Letter: <strong id="s1-target"></strong></div>
         <div class="timer-display" id="s1-timer">10s</div>
      </div>
      <p class="instruction-text">Find and select the target letter before time runs out!</p>
      
      <div class="plank-column" id="letter-column">
         <!-- Rendered dynamically -->
      </div>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="wordBank.js"></script>
  <script src="round1.js"></script>
</body>
</html>
