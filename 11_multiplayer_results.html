<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Battle Arena Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    body {
      background: linear-gradient(180deg, #0a192f 0%, #0d253f 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .arena-header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeInDown 0.8s ease-out;
    }

    .arena-title {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: #ffcc00;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .game-over-banner {
      background: #3f46ab;
      padding: 0.3rem 2rem;
      border-radius: 20px;
      font-weight: 800;
      font-size: 1.1rem;
      display: inline-block;
      margin-top: -10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      border: 2px solid #5a64d1;
    }

    .leaderboard-container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 1.5rem;
      max-height: 55vh;
      overflow-y: auto;
      padding-right: 5px;
    }

    /* Custom Scrollbar for Leaderboard */
    .leaderboard-container::-webkit-scrollbar { width: 6px; }
    .leaderboard-container::-webkit-scrollbar-track { background: rgba(255,255,255,0.05); }
    .leaderboard-container::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 10px; }

    .rank-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      border-radius: 16px;
      padding: 0.8rem 1.2rem;
      display: flex;
      align-items: center;
      gap: 15px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      animation: slideInLeft 0.5s ease-out both;
      flex-shrink: 0;
    }

    /* Rank Specific Styles */
    .rank-card.rank-1 {
      background: linear-gradient(90deg, #d4a017 0%, #f9d976 100%);
      color: #332100;
      border: 2px solid #ffe8a1;
      transform: scale(1.05);
      z-index: 5;
    }
    .rank-card.rank-2 {
      background: linear-gradient(90deg, #606c88 0%, #3f4c6b 100%);
      color: #fff;
    }
    .rank-card.rank-3 {
      background: linear-gradient(90deg, #8e583e 0%, #403030 100%);
      color: #fff;
    }

    .rank-number {
      font-size: 3rem;
      font-weight: 900;
      font-style: italic;
      width: 50px;
      text-align: center;
    }

    .player-avatar {
      width: 55px;
      height: 55px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      border: 3px solid rgba(0,0,0,0.1);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .player-info {
      flex-grow: 1;
    }

    .player-name {
      font-size: 1.5rem;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0;
    }

    .player-score {
      font-size: 1.8rem;
      font-weight: 900;
      margin: 0;
      opacity: 0.9;
    }

    .mini-trophy {
      width: 45px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .arena-footer {
      margin-top: 3rem;
      width: 100%;
      max-width: 400px;
    }

    /* Local button styles removed for Family Standard */

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Status Text */
    .waiting-text {
      font-style: italic;
      color: #aaa;
      text-align: center;
      margin-top: 1rem;
    }

    /* Modal for Learning Achieved */
    .word-modal {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0, 0, 0, 0.85);
      backdrop-filter: blur(10px);
      z-index: 10000;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 1.5rem;
    }
    .word-modal.active { display: flex; }
    .word-modal-content {
      background: rgba(255, 255, 255, 0.95);
      color: #1a237e;
      width: 100%;
      max-width: 500px;
      border-radius: 24px;
      padding: 2.5rem;
      max-height: 80vh;
      overflow-y: auto;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      position: relative;
    }
    .word-modal-title {
      font-family: 'Playfair Display', serif;
      font-size: 2rem;
      margin-bottom: 1.5rem;
      text-align: center;
      border-bottom: 2px solid rgba(26, 35, 126, 0.1);
      padding-bottom: 1rem;
    }
    .word-item {
      margin-bottom: 1.5rem;
      padding: 1rem;
      background: rgba(26, 35, 126, 0.05);
      border-radius: 12px;
      border-left: 5px solid #ffcc00;
    }
    .word-item h4 {
      font-size: 1.4rem;
      text-transform: uppercase;
      margin-bottom: 0.5rem;
    }
    .word-item p {
      font-size: 1rem;
      font-style: italic;
      color: #333;
      line-height: 1.5;
    }
    .close-modal {
      background: #1a237e;
      color: white;
      border: none;
      padding: 1rem;
      width: 100%;
      border-radius: 12px;
      font-weight: 800;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 1rem;
    }
    .rank-card { cursor: pointer; transition: transform 0.2s; }
    .rank-card:hover { transform: scale(1.02); }
  </style>
</head>
<body>

  <div class="arena-header">
    <div style="font-size: 4rem;">🏆</div>
    <h1 class="arena-title">LEADERBOARD</h1>
    <div class="game-over-banner">★ GAME OVER ★</div>
  </div>

  <div class="leaderboard-container" id="leaderboard-list">
    <!-- Ranking cards will be injected here -->
    <div class="waiting-text">Synchronizing with teammates...</div>
  </div>

  <div class="arena-footer">
    <button class="classic-btn primary" id="go-home-btn">Continue</button>
  </div>

  <!-- Learning Achieved Modal -->
  <div id="word-modal" class="word-modal">
    <div class="word-modal-content">
      <h2 class="word-modal-title" id="modal-player-name">Scholar's Words</h2>
      <div id="modal-word-list">
        <!-- Words go here -->
      </div>
      <button class="close-modal" onclick="document.getElementById('word-modal').classList.remove('active')">Dismiss</button>
    </div>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="11_multiplayer_results.js"></script>
</body>
</html>
