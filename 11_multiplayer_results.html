<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Battle Arena Leaderboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    body {
      background: linear-gradient(180deg, #0a192f 0%, #0d253f 100%);
      color: #fff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }

    .arena-header {
      text-align: center;
      margin-bottom: 2rem;
      animation: fadeInDown 0.8s ease-out;
    }

    .arena-title {
      font-family: 'Playfair Display', serif;
      font-size: 3.5rem;
      font-weight: 900;
      color: #ffcc00;
      text-transform: uppercase;
      letter-spacing: 2px;
      margin: 0;
      text-shadow: 0 4px 10px rgba(0,0,0,0.5);
    }

    .game-over-banner {
      background: #3f46ab;
      padding: 0.3rem 2rem;
      border-radius: 20px;
      font-weight: 800;
      font-size: 1.1rem;
      display: inline-block;
      margin-top: -10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.3);
      border: 2px solid #5a64d1;
    }

    .leaderboard-container {
      width: 100%;
      max-width: 500px;
      display: flex;
      flex-direction: column;
      gap: 15px;
      margin-top: 2rem;
    }

    .rank-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(5px);
      border-radius: 16px;
      padding: 1.2rem;
      display: flex;
      align-items: center;
      gap: 20px;
      position: relative;
      overflow: hidden;
      border: 1px solid rgba(255,255,255,0.1);
      animation: slideInLeft 0.5s ease-out both;
    }

    /* Rank Specific Styles */
    .rank-card.rank-1 {
      background: linear-gradient(90deg, #d4a017 0%, #f9d976 100%);
      color: #332100;
      border: 2px solid #ffe8a1;
      transform: scale(1.05);
      z-index: 5;
    }
    .rank-card.rank-2 {
      background: linear-gradient(90deg, #606c88 0%, #3f4c6b 100%);
      color: #fff;
    }
    .rank-card.rank-3 {
      background: linear-gradient(90deg, #8e583e 0%, #403030 100%);
      color: #fff;
    }

    .rank-number {
      font-size: 3rem;
      font-weight: 900;
      font-style: italic;
      width: 50px;
      text-align: center;
    }

    .player-avatar {
      width: 70px;
      height: 70px;
      background: #fff;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
      border: 3px solid rgba(0,0,0,0.1);
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .player-info {
      flex-grow: 1;
    }

    .player-name {
      font-size: 1.5rem;
      font-weight: 800;
      text-transform: uppercase;
      margin: 0;
    }

    .player-score {
      font-size: 1.8rem;
      font-weight: 900;
      margin: 0;
      opacity: 0.9;
    }

    .mini-trophy {
      width: 45px;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.2));
    }

    .arena-footer {
      margin-top: 3rem;
      width: 100%;
      max-width: 400px;
    }

    .btn-continue {
      background: #ffcc00;
      color: #1a1a1a;
      width: 100%;
      padding: 1.2rem;
      border-radius: 50px;
      font-size: 1.5rem;
      font-weight: 900;
      text-transform: uppercase;
      border: none;
      cursor: pointer;
      box-shadow: 0 8px 0 #b38f00, 0 12px 20px rgba(0,0,0,0.3);
      transition: all 0.1s;
    }

    .btn-continue:active {
      transform: translateY(4px);
      box-shadow: 0 4px 0 #b38f00, 0 6px 12px rgba(0,0,0,0.3);
    }

    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes slideInLeft {
      from { opacity: 0; transform: translateX(-50px); }
      to { opacity: 1; transform: translateX(0); }
    }

    /* Status Text */
    .waiting-text {
      font-style: italic;
      color: #aaa;
      text-align: center;
      margin-top: 1rem;
    }

    @media (max-width: 480px) {
      .arena-title { font-size: 1.8rem; }
      .rank-card { gap: 8px; padding: 0.8rem; }
      .rank-number { font-size: 1.2rem; width: 25px; }
      .player-avatar { width: 45px; height: 45px; font-size: 1.8rem; }
      .player-info { min-width: 0; }
      .player-name { 
        font-size: 1rem; 
        white-space: nowrap; 
        overflow: hidden; 
        text-overflow: ellipsis; 
      }
      .player-score { font-size: 1.1rem; }
      .mini-trophy { width: 35px; }
    }
  </style>
</head>
<body>

  <div class="arena-header">
    <div style="font-size: 4rem;">🏆</div>
    <h1 class="arena-title">LEADERBOARD</h1>
    <div class="game-over-banner">★ GAME OVER ★</div>
  </div>

  <div class="leaderboard-container" id="leaderboard-list">
    <!-- Ranking cards will be injected here -->
    <div class="waiting-text">Synchronizing with teammates...</div>
  </div>

  <div class="arena-footer">
    <button class="btn-continue" id="go-home-btn">Continue</button>
  </div>

  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="11_multiplayer_results.js"></script>
</body>
</html>
