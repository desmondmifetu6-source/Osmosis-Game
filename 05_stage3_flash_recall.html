<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 3: Flash Recall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .stage4f-card {
      padding: 2.5rem 2rem;
      max-width: 760px;
      margin: auto;
    }

    .s4f-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border-bottom: 2px dashed var(--text-secondary);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }

    .s4f-header h2 {
      margin: 0;
    }

    .flash-zone {
      min-height: 140px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px dashed var(--accent-primary);
      border-radius: 10px;
      margin: 1rem 0 1.25rem;
      padding: 1rem;
      background: rgba(255, 255, 255, 0.5);
    }

    .flash-word {
      font-size: 3rem;
      font-weight: 800;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--text-main);
    }

    .flash-word.hidden {
      visibility: hidden;
    }

    .hint {
      text-align: center;
      color: var(--text-secondary);
      margin-bottom: 1rem;
      min-height: 24px;
    }

    .feedback {
      text-align: center;
      font-weight: 700;
      min-height: 28px;
      margin-bottom: 1rem;
    }

    .feedback.success {
      color: #2e7d32;
    }

    .feedback.error {
      color: #c62828;
    }

    .word-input {
      font-size: 1.6rem;
      font-weight: 700;
      text-transform: uppercase;
      text-align: center;
    }

    .word-input.correct {
      border-color: #2e7d32;
      background: #e8f5e9;
      color: #2e7d32;
    }

    .word-input.wrong {
      border-color: #c62828;
      background: #ffebee;
      color: #c62828;
    }
  </style>
</head>

<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">
    <div id="intro-container" class="card stage4f-card" style="text-align:center;">
      <h1 style="font-size:2rem; margin-bottom:1rem;">Flash Recall</h1>
      <p style="font-size:1.05rem; color:var(--text-secondary); margin-bottom:1.5rem; line-height:1.55;">
        A word appears for <strong>1 second </strong>, then disappears. Type exactly what you saw.
      </p>
      <button id="start-btn" class="classic-btn" style="max-width:300px;">Start</button>
    </div>

    <div id="quiz-container" class="card stage4f-card" style="display:none;">
      <div class="s4f-header">
        <h2>Stage 3: Flash Recall</h2>
        <div id="quiz-progress" style="font-size:1.2rem; font-weight:bold;">1 / 10</div>
      </div>

      <div class="flash-zone">
        <div id="flash-word" class="flash-word">READY</div>
      </div>
      <p id="flash-hint" class="hint">Watch closely.</p>

      <input type="text" id="typed-word-input" class="word-input" autocomplete="off" spellcheck="false"
        placeholder="Type the word..." disabled>
      <div id="flash-feedback" class="feedback"></div>

      <button id="submit-btn" class="classic-btn" style="display:none;">Submit</button>
      <button id="next-btn" class="classic-btn secondary" style="display:none;">Next</button>
    </div>
  </div>

  <script src="core_dictionary.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="05_stage3_flash_recall.js"></script>
</body>

</html>
