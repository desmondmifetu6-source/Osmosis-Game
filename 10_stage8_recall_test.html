<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 7: Hall of Fame</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .recall-card {
      padding: 2.5rem 2rem;
      max-width: 650px;
      margin: auto;
      background: rgba(255, 255, 255, 0.25) !important;
      backdrop-filter: blur(15px) !important;
      border: 1px solid rgba(255, 255, 255, 0.4) !important;
      border-radius: 20px !important;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.1) !important;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }

    .header h2 {
      margin: 0;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 1px;
    }

    .nd-memory-box {
      min-height: 140px;
      border-radius: 16px;
      background: rgba(255, 255, 255, 0.5);
      border: 1px solid rgba(0, 0, 0, 0.1);
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
      padding: 1.5rem 2rem;
      margin: 1rem 0 1.5rem;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .nd-word {
      font-size: clamp(1.8rem, 5vw, 2.5rem);
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-main);
      margin-bottom: 0.5rem;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      z-index: 2;
    }

    .nd-meaning {
      color: var(--text-main);
      line-height: 1.5;
      max-width: 95%;
      font-size: 1.15rem;
      font-weight: 500;
      opacity: 0.9;
      z-index: 2;
    }

    .nd-hidden-note {
      font-size: 1.1rem;
      font-weight: 600;
      color: var(--accent-primary);
      opacity: 0.9;
    }

    .nd-input {
      margin-bottom: 1rem;
    }

    .nd-input input,
    .nd-input textarea {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(0, 0, 0, 0.15);
      border-radius: 12px;
      background: #ffffff;
      padding: 1rem 1.25rem;
      color: var(--text-main);
      font-size: 1.1rem;
      font-family: inherit;
      transition: all 0.3s ease;
      box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
    }

    .nd-input input:focus,
    .nd-input textarea:focus {
      outline: none;
      border-color: var(--accent-primary);
      box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.15);
    }

    .nd-input textarea {
      min-height: 90px;
      resize: vertical;
      line-height: 1.4;
    }

    .nd-feedback {
      min-height: 2.5rem;
      font-weight: 700;
      margin: 1rem 0;
      font-size: 1.2rem;
      text-align: center;
    }

    .nd-reveal {
      background: rgba(255, 255, 255, 0.4);
      border: 2px solid var(--accent-primary);
      padding: 2.5rem;
      margin-top: 1.5rem;
      border-radius: 20px;
      display: none;
      color: var(--text-main);
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
    }

    .nd-reveal strong {
      display: block;
      margin-bottom: 1rem;
      font-weight: 800;
      font-size: 1.5rem;
      color: var(--accent-primary);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .boss-btn {
      width: 100%;
      max-width: 320px;
      background: var(--accent-primary);
      color: #ffffff;
      border: none;
      padding: 1.2rem 2.5rem;
      border-radius: 12px;
      font-size: 1.2rem;
      font-weight: 800;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      text-transform: uppercase;
      letter-spacing: 1px;
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
    }

    .boss-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
    }

    @media (max-width: 480px) {
      .recall-card { padding: 2rem 1.25rem; }
      .nd-word { font-size: 1.8rem; }
      .nd-meaning { font-size: 1.1rem; }
      .nd-input input, .nd-input textarea { font-size: 1.1rem; padding: 1rem; }
      .nd-reveal { padding: 1.5rem; }
      .nd-reveal strong { font-size: 1.25rem; }
    }


  </style>
</head>

<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">
    <div class="card recall-card">
      <div class="header">
        <h2>Stage 7: Final Recall Test</h2>
        <div id="nd-progress" style="font-size:1.5rem; font-weight:bold;">1 / 10</div>
      </div>
      <div id="nd-memory-box" class="nd-memory-box" style="display: none;"></div>

      <div id="nd-input-wrap" style="display:none;">
        <div class="nd-input">
          <input type="text" id="nd-word-input" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
            placeholder="Type the word you saw">
        </div>
        <div class="nd-input">
          <textarea id="nd-meaning-input" placeholder="Type the meaning you saw" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"></textarea>
        </div>
      </div>

      <div id="nd-feedback" class="nd-feedback" aria-live="polite"></div>
      <div id="nd-reveal" class="nd-reveal">
        <strong id="nd-reveal-word"></strong>
        <p id="nd-reveal-meaning" style="margin:0;"></p>
      </div>

      <div style="display:flex; justify-content:center; margin-top:1rem;">
        <button id="nd-main-btn" class="boss-btn" style="flex:none; padding: 0.5rem 2rem;">Continue</button>
      </div>
    </div>
  </div>
  <script src="core_dictionary.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="10_stage8_recall_test.js"></script>
</body>

</html>
