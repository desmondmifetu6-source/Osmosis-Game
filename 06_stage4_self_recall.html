<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 4: Self-Recall</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .stage4f-card {
      padding: 3rem 2.5rem;
      max-width: 760px;
      margin: auto;
      background: rgba(255, 255, 255, 0.25) !important;
      backdrop-filter: blur(15px) !important;
      border: 2px solid rgba(0, 0, 0, 0.2) !important;
      border-radius: 24px !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15) !important;
    }

    .s4f-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 1.5rem;
      margin-bottom: 2rem;
    }

    .s4f-header h2 {
      margin: 0;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 1px;
    }

    .feedback {
      text-align: center;
      font-weight: 700;
      min-height: 28px;
      margin: 1rem 0;
      font-size: 1.1rem;
    }

    .feedback.success { color: #2e7d32; text-shadow: 0 0 10px rgba(46, 125, 50, 0.2); }
    .feedback.error { color: #c62828; text-shadow: 0 0 10px rgba(198, 40, 40, 0.2); }

    .word-input {
      width: 100%;
      max-width: 450px;
      font-size: 2rem;
      font-weight: 800;
      text-transform: uppercase;
      text-align: center;
      padding: 1.2rem;
      border-radius: 16px;
      background: #ffffff;
      border: 2px solid var(--accent-primary);
      transition: all 0.3s ease;
      letter-spacing: 2px;
      color: var(--text-main);
    }

    .word-input:focus {
      outline: none;
      background: #ffffff;
      border-color: var(--accent-primary);
      box-shadow: 0 0 20px rgba(79, 70, 229, 0.15);
    }

    /* Missed Words Styling */
    .missed-words-card {
      background: rgba(255, 255, 255, 0.35) !important;
    }

    .missed-title {
      font-size: 2.8rem;
      color: var(--text-main);
      font-weight: 800;
      text-align: center;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .missed-subtitle {
      font-size: 1.2rem;
      color: var(--text-main);
      text-align: center;
      margin-bottom: 2.5rem;
      opacity: 0.8;
      font-weight: 500;
    }

    .missed-word-tile {
      padding: 0.8rem 1.5rem;
      background: rgba(255, 255, 255, 0.5);
      color: var(--text-main);
      border: 1px solid rgba(255, 255, 255, 0.8);
      border-radius: 12px;
      font-weight: 700;
      font-size: 1.3rem;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.2s ease;
      animation: fadeInMissed 0.5s ease backwards;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
    }

    .missed-word-tile:hover {
      background: #ffffff;
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0, 0, 0, 0.1);
    }

    @keyframes fadeInMissed {
      from { opacity: 0; transform: translateY(15px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .floating-point {
      position: absolute;
      color: #4caf50;
      font-weight: bold;
      font-family: monospace;
      font-size: 2rem;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 200;
      text-shadow: 1px 1px 2px #000;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1.5);
      }

      100% {
        opacity: 0;
        transform: translateY(-50px) scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">

    <div id="transition-container" class="card stage4f-card" style="text-align: center;">
      <h2 class="welcome-lap2" style="font-size: 2.2rem; color: #111111; margin-bottom: 1rem; font-weight:700;">Self
        Recall challenge</h2>
      <p style="font-size:1.15rem; margin-bottom:2rem; color:#555555;">Type
        all or as many of those terms you met, without any hints.</p>
      <button id="start-lap2-btn" class="classic-btn blue-gradient">Proceed</button>
    </div>

    <!-- Lap 2 Container -->
    <div id="lap2-container" class="card stage4f-card"
      style="display: none; background: #ffffff; border: 1px solid #e5e5e5; border-radius:8px; box-shadow:none;">
      <div class="s4f-header">
        <h2 style="color: #111111; font-weight:700; font-size:1.8rem;">Stage 4: Self Recall challenge</h2>
      </div>
      <p style="font-weight:500; margin-bottom:1rem; text-align: center; color:#555;">Recall all terms</p>
      <div class="test-area" style="text-align: center; margin-bottom:1rem;">
        <input type="text" id="lap2-input" class="word-input" autocomplete="off" autocorrect="off" autocapitalize="off"
          spellcheck="false" style="border: 1px solid #d4d4d4; border-radius:4px; background:#fff; color:#111;">
        <div id="lap2-feedback" class="feedback" style="font-size:1rem; margin-top:0.5rem; height:1.5rem;"></div>
        <button id="finish-recall-btn" class="classic-btn primary">Next</button>
      </div>
      <div id="lap2-words-list"
        style="display:flex; flex-wrap:wrap; justify-content:center; gap:5px; min-height:100px; padding:1rem; background:#fafafa; border:1px solid #e5e5e5; border-radius:4px;">
      </div>
    </div>

    <!-- Missed Words Container -->
    <div id="missed-words-container" class="card stage4f-card missed-words-card"
      style="display: none; box-shadow:none;">
      <div style="text-align: center; margin-bottom: 1rem;">
        <h2 class="missed-title">Unrecalled Words</h2>
        <p class="missed-subtitle">Take a moment to review the words you couldn't recall.</p>
      </div>
      <div id="missed-words-list"
        style="display:flex; flex-wrap:wrap; justify-content:center; gap:8px; min-height:120px; padding:1.5rem; background: #fafafa; border-radius:4px; margin-bottom: 2rem; border: 1px solid #e5e5e5;">
      </div>
      <div style="text-align: center;">
        <button id="finish-stage-missed-btn" class="classic-btn blue-gradient">Continue</button>
      </div>
    </div>
  </div>

  <script src="core_dictionary.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="06_stage4_self_recall.js"></script>
</body>

</html>
