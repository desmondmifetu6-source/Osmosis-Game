<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Osmosis - Profile</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="global.css">
  <style>
    .history-card { text-align: left; }
    .history-item { padding: 1rem; border-bottom: 1px dashed var(--ink-light); margin-bottom: 1rem; }
    .history-item:last-child { border-bottom: none; }
    .history-header { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-family: var(--font-serif); font-weight: bold; }
    .history-stats { color: var(--gold); text-shadow: 1px 1px 0px rgba(0,0,0,0.5); }
    .history-words { font-size: 0.9rem; color: var(--ink-light); font-style: italic; }
  </style>
</head>
<body>
  <div class="app-container">
    <div class="card history-card">
      <h2 style="text-align:center;">Scholar's Record</h2>
      <div id="history-list" style="margin-bottom:2rem;">
        <!-- History populated here -->
      </div>
      <button id="go-home-btn" class="classic-btn secondary">Return to Menu</button>
    </div>
  </div>
  <script src="shared.js"></script>
  <script src="profile.js"></script>
</body>
</html>
