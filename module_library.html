<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Dictionary Library</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    body {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .search-bar {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      align-items: stretch;
    }

    .search-bar input {
      margin-bottom: 0;
      text-align: left;
      border-radius: 8px;
      flex: 1;
    }

    .search-bar button {
      width: auto;
      margin-bottom: 0;
      padding: 0 1.5rem;
    }

    .definition-box {
      text-align: left;
      padding: 1.5rem;
      display: none;
      margin-bottom: 2rem;
    }

    .dict-word {
      font-family: var(--font-serif);
      font-size: 2rem;
      margin-bottom: 0.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 0.5rem;
      text-transform: capitalize;
    }

    .dict-phonetic {
      font-style: italic;
      margin-bottom: 1rem;
      display: block;
    }

    .dict-meaning {
      font-size: 1.1rem;
      line-height: 1.65;
    }

    .dict-error {
      font-style: italic;
      text-align: center;
      margin: 2rem 0;
      display: none;
    }

    @media (max-width: 480px) {
      .search-bar {
        flex-direction: column;
        gap: 0.5rem;
      }

      .search-bar button {
        width: 100%;
        padding: 0.8rem;
      }
    }
  </style>
</head>

<body class="dict-cover-page library-page">
  <div class="dict-cover-bg" aria-hidden="true"></div>
  <div class="dict-cover-overlay" aria-hidden="true"></div>

  <div class="app-container">
    <div class="card">
      <div class="dict-book-hero">
        <img src="assets/stem_dictionary_cover.png" alt="Science, Technology and Mathematics Dictionary cover" class="dict-book-thumb dict-cover-preview" title="View cover">
        <p class="dict-cover-hint">Tap cover to enlarge</p>
        <h2 class="dict-page-title">Dictionary</h2>
        <p class="dict-subtitle" style="text-align:center; margin:0;">Search the official Osmosis STEM dictionary for scientific definitions.</p>
        <span class="dict-source-tag">Science · Technology · Mathematics</span>
      </div>

      <div class="search-bar">
        <input type="text" id="dict-input" placeholder="Search a word..." autocomplete="off">
        <button id="dict-search-btn" class="classic-btn">Search</button>
      </div>

      <div id="dict-error" class="dict-error">
        Word not found in the STEM Dictionary. Try another spelling or term.
      </div>

      <div id="dict-result" class="definition-box">
        <div class="dict-word" id="res-word">Word</div>
        <span class="dict-phonetic" id="res-phonetic">Osmosis STEM Dictionary</span>
        <div class="dict-meaning" id="res-meaning">Meaning goes here.</div>
      </div>

      <button id="go-home-btn" class="classic-btn blue-gradient" style="margin-top:1rem;">Return to Menu</button>
    </div>
  </div>
  <script src="core_dictionary.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="dict_cover_lightbox.js"></script>
  <script src="module_library.js"></script>
</body>

</html>
