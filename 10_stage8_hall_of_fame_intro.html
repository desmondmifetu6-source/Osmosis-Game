<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 7: Hall of Fame Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .intro-card {
      max-width: 680px;
      margin: auto;
      padding: 3.5rem 2.5rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.25) !important;
      backdrop-filter: blur(15px) !important;
      border: 1px solid rgba(255, 255, 255, 0.4) !important;
      border-radius: 24px !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1) !important;
    }

    .intro-title {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 1.5rem;
    }

    .intro-narrative {
      font-size: 1.25rem;
      line-height: 1.8;
      color: var(--text-main);
      text-align: center;
      margin-bottom: 2.5rem;
      font-weight: 500;
      opacity: 0.9;
    }

    .intro-narrative strong {
      display: block;
      color: var(--accent-primary);
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .continue-btn {
      font-family: var(--font-main);
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 1.2rem 3.5rem;
      background: var(--accent-primary);
      color: #fff;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 25px rgba(79, 70, 229, 0.3);
    }

    .continue-btn:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 35px rgba(79, 70, 229, 0.4);
      filter: brightness(1.1);
    }

    .continue-btn:active {
      transform: translateY(0) scale(1);
    }

    @media (max-width: 480px) {
      .intro-card {
        padding: 2rem 1.5rem;
        margin: 1rem;
      }

      .intro-title {
        font-size: 1.8rem;
      }

      .intro-narrative {
        font-size: 1.05rem;
      }
    }
  </style>
</head>

<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">
    <div class="card intro-card">

      <h2 class="intro-title">Stage 7: Hall of Fame</h2>

      <p class="intro-narrative">
        <strong>Final Challenge</strong>
        You have reached the ultimate test. To enter the Hall of Fame, you must recall every term and definition you have learned.
        Words will flash for 5 seconds—memorize them and prove your mastery!
      </p>

      <button id="continue-btn" class="continue-btn">Continue</button>

    </div>
  </div>
  <script src="core_dictionary.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Load score
      const gameData = sharedState.load();
      const scoreEl = document.getElementById('current-score');
      if (scoreEl && gameData.score) scoreEl.textContent = gameData.score;

      // Continue button → go to the recall test
      const btn = document.getElementById('continue-btn');
      if (btn) {
        btn.addEventListener('click', () => {
          if (typeof window.navigateWithTransition === 'function') navigateWithTransition('10_stage8_recall_test.html');
          else window.location.href = '10_stage8_recall_test.html';
        });
      }
    });
  </script>
</body>

</html>
