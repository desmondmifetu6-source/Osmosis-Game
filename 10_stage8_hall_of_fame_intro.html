<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 7: Hall of Fame Challenge</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .intro-card {
      max-width: 680px;
      margin: auto;
      padding: 3.5rem 2.5rem;
      text-align: center;
      background: rgba(255, 255, 255, 0.4) !important;
      backdrop-filter: blur(25px) saturate(180%) !important;
      border: 1px solid rgba(255, 255, 255, 0.5) !important;
      border-radius: 24px !important;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.15) !important;
      position: relative;
      z-index: 10;
    }

    .intro-title {
      font-size: clamp(1.8rem, 5vw, 2.8rem);
      font-weight: 800;
      color: var(--text-main);
      margin-bottom: 2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 1.5rem;
    }

    .intro-narrative {
      font-size: 1.25rem;
      line-height: 1.8;
      color: var(--text-main);
      text-align: center;
      margin-bottom: 2.5rem;
      font-weight: 500;
      opacity: 0.9;
    }

    .intro-narrative strong {
      display: block;
      color: var(--accent-primary);
      font-size: 1.5rem;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .continue-btn-gold {
      font-family: var(--font-main);
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: 1px;
      padding: 1.2rem 4rem;
      background: #ffcc00;
      /* Golden Yellow */
      color: #000;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      box-shadow: 0 10px 25px rgba(255, 204, 0, 0.3);
      width: 100%;
      max-width: 380px;
    }

    .continue-btn-gold:hover {
      transform: translateY(-5px) scale(1.05);
      box-shadow: 0 15px 35px rgba(255, 204, 0, 0.5);
      filter: brightness(1.1);
    }

    .continue-btn-gold:active {
      transform: translateY(0) scale(1);
    }

    @media (max-width: 480px) {
      .intro-card {
        padding: 2rem 1.5rem;
        margin: 1rem;
      }

      .intro-title {
        font-size: 1.8rem;
      }

      .intro-narrative {
        font-size: 1.05rem;
      }
    }

    /* Falling Elements Background */
    #celebration-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }

    .falling-item {
      position: absolute;
      width: 12px;
      height: 12px;
      opacity: 0.8;
      user-select: none;
      animation: fall linear infinite;
    }

    .confetti-blue {
      background: #1a237e;
    }

    .confetti-gold {
      background: #ffcc00;
    }

    .confetti-white {
      background: #ffffff;
    }

    @keyframes fall {
      0% {
        transform: translateY(-10vh) translateX(0) rotate(0deg);
      }

      25% {
        transform: translateY(20vh) translateX(15px) rotate(90deg);
      }

      50% {
        transform: translateY(50vh) translateX(-15px) rotate(180deg);
      }

      75% {
        transform: translateY(80vh) translateX(10px) rotate(270deg);
      }

      100% {
        transform: translateY(110vh) translateX(0) rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div id="celebration-bg"></div>

  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">
    <div class="card intro-card">

      <h2 class="intro-title" style="color: #1a237e;">Stage 7: To Hall of Fame <span
          style="font-size: 1em; vertical-align: middle;">🏆</span></h2>

      <p class="intro-narrative" style="color: #1a237e;">
        <strong style="color: #3949ab;"> Final Challenge</strong>
        You have reached the ultimate goal.
        Terms and Meanings met on your Osmosis journey will flash one by one for 5 seconds. Put them into memory , and
        recall each by typing , to Enter the Hall of
        Fame!
      </p>

      <button id="continue-btn" class="classic-btn blue-gradient">Continue</button>

    </div>
  </div>
  <script src="core_dictionary.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Load score
      const gameData = sharedState.load();
      const scoreEl = document.getElementById('current-score');
      if (scoreEl && gameData.score) scoreEl.textContent = gameData.score;

      // Continue button → go to the recall test
      const btn = document.getElementById('continue-btn');
      if (btn) {
        btn.addEventListener('click', () => {
          if (typeof window.navigateWithTransition === 'function') navigateWithTransition('10_stage8_recall_test.html');
          else window.location.href = '10_stage8_recall_test.html';
        });
      }

      // Initialize falling elements
      initFallingElements();
    });

    function initFallingElements() {
      const bg = document.getElementById('celebration-bg');
      const colors = ['confetti-blue', 'confetti-gold', 'confetti-white'];
      const count = 50;

      for (let i = 0; i < count; i++) {
        const div = document.createElement('div');
        div.className = 'falling-item ' + colors[Math.floor(Math.random() * colors.length)];

        // Randomize
        div.style.left = Math.random() * 100 + 'vw';

        // Stagger vertical start
        const initialTop = Math.random() * 120 - 20;
        div.style.top = initialTop + 'vh';

        div.style.animationDuration = (Math.random() * 4 + 3) + 's';
        div.style.animationDelay = '-' + (Math.random() * 10) + 's';

        // Randomize size slightly
        const size = (Math.random() * 8 + 6) + 'px';
        div.style.width = size;
        div.style.height = (Math.random() * 12 + 8) + 'px'; // Rectangular

        bg.appendChild(div);
      }
    }
  </script>
</body>

</html>
