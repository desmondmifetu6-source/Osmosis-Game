<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Welcome</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    body,
    html {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      font-family: 'Inter', sans-serif;
      overflow: hidden;
    }

    #confetti-canvas {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 5;
    }

    /* Phase 0: Hall of Fame Style Welcome */
    #phase0-welcome {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 100;
      padding: 2rem;
    }

    .hof-card {
      background: rgba(255, 255, 255, 0.4) !important;
      backdrop-filter: blur(20px) !important;
      border: 1px solid rgba(255, 255, 255, 0.6) !important;
      border-radius: 32px !important;
      box-shadow: 0 30px 70px rgba(0, 0, 0, 0.1) !important;
      max-width: 550px;
      width: 100%;
      padding: 4rem 3rem;
      text-align: center;
      animation: slideUp 0.8s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes slideUp {
      from {
        opacity: 0;
        transform: translateY(40px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .hof-trophy {
      font-size: 7rem;
      line-height: 1;
      margin-bottom: 2rem;
      animation: bounce 1.2s ease-in-out infinite alternate;
      filter: drop-shadow(0 15px 30px rgba(255, 215, 0, 0.4));
    }

    @keyframes bounce {
      from {
        transform: translateY(0) scale(1);
      }

      to {
        transform: translateY(-15px) scale(1.05);
      }
    }

    .welcome-text {
      font-family: 'Playfair Display', serif;
      font-size: 2.2rem;
      font-weight: 700;
      color: #1a1a1a;
      line-height: 1.3;
      margin-bottom: 3rem;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    /* Phase 1: Kinetic Intro */
    #kinetic-intro {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: linear-gradient(135deg, #e0c3fc 0%, #c2e9fb 100%);
      display: none;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 90;
      padding: 2rem;
      text-align: center;
    }

    .intro-line {
      opacity: 0;
      transform: scale(0.8);
      margin: 1rem 0;
      line-height: 1.2;
    }

    #line-yell {
      font-family: 'Playfair Display', serif;
      font-size: clamp(2.2rem, 12vw, 4.5rem);
      font-weight: 900;
      color: #1a237e;
      text-transform: uppercase;
      letter-spacing: 4px;
      margin-right: -4px;
      /* Offset for letter-spacing to ensure perfect center */
      line-height: 1.1;
      margin-bottom: 0.5rem;
      width: 100%;
    }

    #line-response {
      font-size: clamp(1.4rem, 8vw, 3.2rem);
      color: #3949ab;
      font-weight: 700;
      font-style: italic;
      line-height: 1.2;
    }

    #line-together {
      font-size: clamp(1rem, 3vw, 1.4rem);
      color: #1a237e;
      font-weight: 500;
      max-width: 90%;
      margin-top: 1.5rem;
      line-height: 1.6;
      letter-spacing: 0.5px;
    }

    .animate-yell {
      animation: yellPop 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
    }

    .animate-response {
      animation: responseFade 0.6s ease-out forwards;
      animation-delay: 0.8s;
    }

    .animate-together {
      animation: togetherSlide 1s ease-out forwards;
      animation-delay: 1.8s;
    }

    @keyframes yellPop {
      0% {
        opacity: 0;
        transform: scale(0.5) translateY(50px);
      }

      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
      }
    }

    @keyframes responseFade {
      0% {
        opacity: 0;
        transform: scale(0.9);
      }

      100% {
        opacity: 1;
        transform: scale(1.1);
      }
    }

    @keyframes togetherSlide {
      0% {
        opacity: 0;
        transform: translateY(30px);
      }

      100% {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .intro-card {
      background: rgba(255, 255, 255, 0.4);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 4rem 3rem;
      max-width: 650px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.6);
      z-index: 2;
    }

    /* Main Login Screen Styling */
    .app-container {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: none;
      justify-content: center;
      align-items: center;
      padding: 1rem;
    }

    .login-plaque {
      position: relative;
      background: rgba(255, 255, 255, 0.35);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 4rem 3rem;
      max-width: 500px;
      width: 100%;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.1);
      border: 1px solid rgba(255, 255, 255, 0.6);
    }

    #username-input {
      width: 100%;
      padding: 1.2rem;
      font-size: 1.2rem;
      background: #f8f9fa;
      border: 2px solid #eee;
      border-radius: 12px;
      margin-bottom: 2rem;
      color: #111;
      font-family: 'Inter', sans-serif;
    }

    .classic-btn {
      background: #1a237e;
      color: white;
      border: none;
      padding: 1.2rem 2.5rem;
      font-size: 1.4rem;
      border-radius: 12px;
      cursor: pointer;
      width: 100%;
      font-weight: 700;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(26, 35, 126, 0.2);
    }

    .classic-btn:hover {
      background: #283593;
      transform: translateY(-3px);
    }

    .avatar-selection {
      display: flex;
      justify-content: center;
      gap: 1.5rem;
      margin: 2rem 0;
    }

    .avatar-option {
      font-size: 2.5rem;
      cursor: pointer;
      padding: 0.8rem;
      border-radius: 16px;
      transition: all 0.2s ease;
      border: 3px solid transparent;
      background: #f8f9fa;
    }

    .avatar-option.selected {
      border-color: #1a237e;
      background: #eef2ff;
      transform: scale(1.1);
    }

    #akwaaba-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: #ffffff;
      color: #1a237e;
      font-size: 2.2rem;
      font-weight: 800;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.5s ease;
      z-index: 50;
      border-radius: 24px;
    }

    #akwaaba-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @media (max-width: 480px) {

      .hof-card,
      .login-plaque,
      .intro-card {
        padding: 2.5rem 1.2rem;
        /* Reduced horizontal padding */
      }

      .welcome-text {
        font-size: 1.6rem;
      }

      .classic-btn {
        font-size: 1.1rem;
        padding: 1rem;
      }

      #line-yell {
        letter-spacing: 2px;
        /* Reduce spacing on tiny screens */
      }
    }
  </style>
</head>

<body>
  <canvas id="confetti-canvas"></canvas>

  <!-- Phase 0: The Cup Screen (HALL OF FAME Aesthetic) -->
  <div id="phase0-welcome">
    <div class="hof-card">
      <div class="hof-trophy">🏆</div>
      <h1 class="welcome-text">Welcome to the Most Effective <br>STEM Learning Games</h1> <strong>Ever</strong>
      <button id="p0-continue-btn" class="classic-btn primary">Continue</button>
    </div>
  </div>

  <!-- Phase 1: Kinetic Intro (Osmosis Screen) -->
  <div id="kinetic-intro">
    <div class="intro-card">
      <div id="line-yell" class="intro-line">Osmosis!</div>
      <div id="line-response" class="intro-line">Fun time with science</div>
      <div id="line-together" class="intro-line">
        Quick, Easy, Fun-filled; For High Interest in STEM, increased participation, and Excellent Performance for
        Life
      </div>
      <div id="proceed-btn-wrap" style="opacity: 0; margin-top: 3rem;">
        <button id="intro-proceed-btn" class="classic-btn blue-gradient">Continue</button>
      </div>
    </div>
  </div>

  <!-- Phase 2: Login App UI -->
  <div class="app-container" id="main-app-ui">
    <div class="login-plaque">
      <div id="login-content">
        <h1
          style="font-family:'Playfair Display',serif; font-size: clamp(2.5rem, 12vw, 4rem); color:#1a237e; margin-bottom:0.5rem; line-height: 1; letter-spacing: 2px; margin-right: -2px;">
          Osmosis
        </h1>
        <p
          style="font-style:italic; font-weight:700; color:#3949ab; font-size: clamp(1rem, 5vw, 1.2rem); margin-bottom:3rem;">
          Fun time
          with science</p>

        <h2 style="font-size: 1.5rem; margin-bottom: 1rem;">Enter your name</h2>
        <input type="text" id="username-input" placeholder="Your Name" autocomplete="off">

        <h3 style="font-size: 1rem; font-weight: 700; color: #555; text-transform: uppercase;">Select Your Character
        </h3>
        <div class="avatar-selection" id="avatar-grid">
          <div class="avatar-option selected" data-avatar="🤓">🤓</div>
          <div class="avatar-option" data-avatar="😊">😊</div>
          <div class="avatar-option" data-avatar="😎">😎</div>
          <div class="avatar-option" data-avatar="🧐">🧐</div>
        </div>

        <button id="login-btn" class="classic-btn">Start Game</button>
      </div>

      <div id="welcome-back-content" style="display: none;">
        <h1 id="welcome-back-title"
          style="font-family:'Playfair Display',serif; font-size: clamp(2.5rem, 12vw, 3.5rem); color:#1a237e; margin-bottom: 2rem; line-height: 1;">
          Osmosis
        </h1>
        <div style="display: flex; flex-direction: column; gap: 1.5rem;">
          <button id="continue-saved-btn" class="classic-btn blue-gradient">Continue as Saved</button>
          <button id="continue-guest-btn" class="classic-btn pink-gradient">Play as Guest</button>
          <button id="switch-user-link" class="classic-btn sky-gradient">Switch Account</button>
        </div>
      </div>
      <div id="akwaaba-screen"></div>
    </div>
  </div>

  <script src="core_shared_state.js"></script>
  <script src="index.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const p0 = document.getElementById('phase0-welcome');
      const p0Btn = document.getElementById('p0-continue-btn');
      const kIntro = document.getElementById('kinetic-intro');
      const kBtnWrap = document.getElementById('proceed-btn-wrap');
      const mainApp = document.getElementById('main-app-ui');

      // Phase 0 -> Phase 1
      p0Btn.addEventListener('click', () => {
        p0.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
        p0.style.opacity = '0';
        p0.style.transform = 'scale(0.95)';
        setTimeout(() => {
          p0.style.display = 'none';
          kIntro.style.display = 'flex';
          startKineticIntro();
        }, 600);
      });

      function startKineticIntro() {
        setTimeout(() => document.getElementById('line-yell').classList.add('animate-yell'), 500);
        setTimeout(() => document.getElementById('line-response').classList.add('animate-response'), 600);
        setTimeout(() => document.getElementById('line-together').classList.add('animate-together'), 700);
        setTimeout(() => {
          kBtnWrap.style.opacity = '1';
          kBtnWrap.style.transition = 'opacity 0.8s ease';
        }, 2800);
      }

      // Phase 1 -> Phase 2 (Login)
      document.getElementById('intro-proceed-btn').addEventListener('click', () => {
        kIntro.style.transition = 'opacity 0.6s ease, transform 0.6s ease';
        kIntro.style.opacity = '0';
        kIntro.style.transform = 'scale(1.05)';
        setTimeout(() => {
          kIntro.style.display = 'none';
          mainApp.style.display = 'flex';
          mainApp.style.animation = 'fadeIn 1s ease-out';
        }, 600);
      });

      // Confetti logic
      (function () {
        const canvas = document.getElementById('confetti-canvas');
        const ctx = canvas.getContext('2d');
        let W, H, pieces = [];
        function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
        function rand(min, max) { return Math.random() * (max - min) + min; }
        const COLORS = ['#c8980a', '#f5c842', '#0f1f3d', '#ffffff', '#e8a020', '#3a5fa0'];
        function spawn() {
          return {
            x: rand(0, W), y: rand(-20, -5), w: rand(6, 14), h: rand(10, 20),
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            vx: rand(-1.5, 1.5), vy: rand(2, 5), angle: rand(0, Math.PI * 2), spin: rand(-0.08, 0.08), opacity: 1
          };
        }
        function init() {
          resize();
          window.addEventListener('resize', resize);
          for (let i = 0; i < 60; i++) {
            const p = spawn(); p.y = rand(0, H); pieces.push(p);
          }
          loop();
        }
        function loop() {
          ctx.clearRect(0, 0, W, H);
          if (pieces.length < 100) pieces.push(spawn());
          pieces = pieces.filter(p => p.opacity > 0.05);
          pieces.forEach(p => {
            p.x += p.vx; p.y += p.vy; p.angle += p.spin;
            if (p.y > H + 20) p.opacity -= 0.02;
            ctx.save(); ctx.globalAlpha = p.opacity; ctx.translate(p.x, p.y); ctx.rotate(p.angle); ctx.fillStyle = p.color; ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h); ctx.restore();
          });
          requestAnimationFrame(loop);
        }
        init();
      })();
    });
  </script>
</body>

</html>
