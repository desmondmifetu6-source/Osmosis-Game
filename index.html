<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&family=Playfair+Display:wght@700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background: linear-gradient(-45deg, #e0f7fa, #b2ebf2, #80deea, #4dd0e1) !important;
      background-size: 400% 400% !important;
      animation: gradientBG 15s ease infinite !important;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    @keyframes gradientBG {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .app-container {
      width: 100%;
      display: flex;
      justify-content: center;
      padding: 1rem;
      box-sizing: border-box;
    }

    .login-plaque {
      position: relative;
      overflow: hidden;
      background: #FFFFFF;
      border: 1px solid #E0E0E0;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15), 0 4px 10px rgba(0, 0, 0, 0.05);
      border-radius: 16px;
      padding: 3rem 2rem;
      max-width: 450px;
      width: 100%;
      text-align: center;
    }

    .logo {
      font-family: 'Playfair Display', serif;
      font-size: 3.8rem;
      color: #1a237e;
      letter-spacing: 2px;
      margin: 0 0 0.5rem 0;
      text-shadow: 2px 2px 4px rgba(255, 255, 255, 0.6);
    }

    .tagline {
      font-style: italic;
      color: #3949ab;
      margin-bottom: 0.5rem;
      font-size: 1.1rem;
    }

    .sub-tagline {
      font-style: italic;
      color: #b8860b; /* Dark Goldenrod for good contrast */
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 2.5rem;
      text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.8);
      animation: floatUp 1.2s ease-out forwards;
      animation-delay: 0.3s;
      opacity: 0;
    }

    @keyframes floatUp {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    #username-input {
      width: 100%;
      padding: 1rem;
      font-size: 1.1rem;
      background: rgba(255, 255, 255, 0.6);
      border: 2px solid rgba(255, 255, 255, 0.9);
      border-radius: 10px;
      margin-bottom: 1.5rem;
      color: #111;
      box-sizing: border-box;
      transition: all 0.3s ease;
      font-family: 'Inter', sans-serif;
    }

    #username-input:focus {
      outline: none;
      background: rgba(255, 255, 255, 0.95);
      border-color: #1a237e;
      box-shadow: 0 0 10px rgba(26, 35, 126, 0.2);
    }

    .classic-btn {
      background: #1a237e;
      color: white;
      border: none;
      padding: 1rem 2rem;
      font-size: 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      width: 100%;
      font-weight: 600;
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(26, 35, 126, 0.3);
    }

    .classic-btn:hover {
      background: #283593;
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(26, 35, 126, 0.4);
    }

    .classic-btn.outline {
      background: transparent;
      color: #1a237e;
      border: 2px solid #1a237e;
      box-shadow: none;
    }

    .classic-btn.outline:hover {
      background: rgba(26, 35, 126, 0.1);
      transform: translateY(-2px);
    }

    #akwaaba-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: var(--bg-light);
      color: var(--text-main);
      font-size: 2.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
      z-index: 10;
    }

    #akwaaba-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    #login-content {
      transition: opacity 0.5s ease;
    }

    #login-content.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      #akwaaba-screen {
        font-size: 1.8rem;
        line-height: 1.3;
        padding: 1rem;
        word-wrap: break-word;
      }
    }

    /* Intro Splash Screen */
    #intro-splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #e0f7fa; /* Match the bright gradient theme */
      color: #1a237e;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease, visibility 1s ease;
    }
    #intro-splash.hidden {
      opacity: 0;
      visibility: hidden;
    }
    #intro-splash img {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      animation: pulseLogo 2s infinite ease-in-out;
    }
    #intro-splash p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      letter-spacing: 2px;
      margin: 0;
      font-style: italic;
    }
    @keyframes pulseLogo {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }
    /* Avatar Selection */
    .avatar-selection {
      margin: 1.5rem 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 0.5rem;
    }
    .avatar-option {
      cursor: pointer;
      border: 3px solid transparent;
      border-radius: 50%;
      padding: 5px;
      transition: all 0.3s ease;
      background: rgba(255, 255, 255, 0.5);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      aspect-ratio: 1/1;
    }
    .avatar-option.selected {
      border-color: #1a237e;
      background: #fff;
      transform: scale(1.15);
      box-shadow: 0 6px 16px rgba(26, 35, 126, 0.3);
    }
    .avatar-option:hover {
      background: #fff;
      transform: scale(1.05);
    }
    .avatar-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      display: block;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <div class="card login-plaque">
      <div id="login-content">
        <h1 class="logo">Osmosis</h1>
        <p class="tagline">Fun time with science</p>
        <p class="sub-tagline">A Rapid Fun-filled STEM Learning Game for All Ages</p>
        
        <h2>Enter your name</h2>
        <input type="text" id="username-input" placeholder="Your Name" autocomplete="off">
        
        <span class="avatar-label">Select Your Character</span>
        <div class="avatar-selection" id="avatar-grid">
          <div class="avatar-option selected" data-avatar="🤓" title="Nerd">🤓</div>
          <div class="avatar-option" data-avatar="😊" title="Blushing">😊</div>
          <div class="avatar-option" data-avatar="😎" title="Cool">😎</div>
          <div class="avatar-option" data-avatar="🧐" title="Intellectual">🧐</div>
        </div>

        <button id="login-btn" class="classic-btn">Continue</button>
      </div>
      <div id="welcome-back-content" style="display: none; text-align: center;">
        <h1 class="logo">Osmosis</h1>
        <p class="tagline">FUNTIME WITH SCIENCE.</p>
        <p class="sub-tagline">A Rapid Fun-filled STEM Learning Game for All Ages</p>
        <h2 id="welcome-back-title" style="margin-bottom: 30px;">Welcome back</h2>
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
          <button id="continue-saved-btn" class="classic-btn" style="width: 80%; padding: 10px;">Continue as
            Saved</button>
          <button id="continue-guest-btn" class="classic-btn outline"
            style="width: 80%; padding: 10px;">Continue as
            Guest</button>
          <a href="#" id="switch-user-link"
            style="color: var(--text-secondary); font-size: 0.9em; margin-top: 10px; cursor: pointer;">Login as a
            different user</a>
        </div>
      </div>
      <div id="akwaaba-screen"></div>
    </div>
  </div>
  <div id="intro-splash">
    <img src="assets/osmosis-favicon.svg" alt="Osmosis Logo">
    <p>Fun time with science</p>
  </div>

  <script src="core_shared_state.js"></script>
  <script src="index.js"></script>
</body>

</html>
