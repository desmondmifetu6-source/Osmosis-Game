<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Login</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    body {
      background: var(--bg-light);
    }

    .login-plaque {
      position: relative;
      overflow: hidden;
    }

    .logo {
      font-size: 3.5rem;
      color: var(--text-main);
      letter-spacing: 2px;
    }

    .tagline {
      font-style: italic;
      color: var(--text-secondary);
      margin-bottom: 2rem;
    }

    #akwaaba-screen {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      background: var(--bg-light);
      color: var(--text-main);
      font-size: 2.5rem;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1s ease;
      z-index: 10;
    }

    #akwaaba-screen.visible {
      opacity: 1;
      pointer-events: all;
    }

    #login-content {
      transition: opacity 0.5s ease;
    }

    #login-content.hidden {
      opacity: 0;
      pointer-events: none;
    }

    @media (max-width: 480px) {
      #akwaaba-screen {
        font-size: 1.8rem;
        line-height: 1.3;
        padding: 1rem;
        word-wrap: break-word;
      }
    }

    /* Intro Splash Screen */
    #intro-splash {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-light); /* Pure white to match the game */
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
      transition: opacity 1s ease, visibility 1s ease;
    }
    #intro-splash.hidden {
      opacity: 0;
      visibility: hidden;
    }
    #intro-splash img {
      width: 120px;
      height: 120px;
      margin-bottom: 20px;
      animation: pulseLogo 2s infinite ease-in-out;
    }
    #intro-splash p {
      font-size: 1.2rem;
      color: var(--text-secondary);
      letter-spacing: 2px;
      margin: 0;
      font-style: italic;
    }
    @keyframes pulseLogo {
      0% { transform: scale(0.95); opacity: 0.8; }
      50% { transform: scale(1.05); opacity: 1; }
      100% { transform: scale(0.95); opacity: 0.8; }
    }
    /* Avatar Selection */
    .avatar-selection {
      margin: 1.5rem 0;
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      padding: 0.5rem;
    }
    .avatar-option {
      cursor: pointer;
      border: 3px solid transparent;
      border-radius: 50%;
      padding: 5px;
      transition: all 0.2s ease;
      background: var(--surface-dim);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      aspect-ratio: 1/1;
    }
    .avatar-option.selected {
      border-color: var(--accent-primary);
      background: #fff;
      transform: scale(1.1);
      box-shadow: 0 4px 12px rgba(79, 70, 229, 0.2);
    }
    .avatar-option:hover {
      background: #fff;
    }
    .avatar-label {
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 0.5rem;
      display: block;
    }
  </style>
</head>

<body>
  <div class="app-container">
    <div class="card login-plaque">
      <div id="login-content">
        <h1 class="logo">Osmosis</h1>
        <p class="tagline">Fun time with science</p>
        
        <h2>Enter your name</h2>
        <input type="text" id="username-input" placeholder="Your Name" autocomplete="off">
        
        <span class="avatar-label">Select Your Character</span>
        <div class="avatar-selection" id="avatar-grid">
          <div class="avatar-option selected" data-avatar="👦" title="Boy Yellow">👦</div>
          <div class="avatar-option" data-avatar="👤" title="Boy Blue">👤</div>
          <div class="avatar-option" data-avatar="👧" title="Girl Pink">👧</div>
          <div class="avatar-option" data-avatar="🧢" title="Boy Green">🧢</div>
        </div>

        <button id="login-btn" class="classic-btn">Continue</button>
      </div>
      <div id="welcome-back-content" style="display: none; text-align: center;">
        <h1 class="logo">Osmosis</h1>
        <p class="tagline">FUNTIME WITH SCIENCE.</p>
        <h2 id="welcome-back-title" style="margin-bottom: 30px;">Welcome back</h2>
        <div style="display: flex; flex-direction: column; gap: 15px; align-items: center;">
          <button id="continue-saved-btn" class="classic-btn" style="width: 80%; padding: 10px;">Continue as
            Saved</button>
          <button id="continue-guest-btn" class="classic-btn outline"
            style="width: 80%; padding: 10px;">Continue as
            Guest</button>
          <a href="#" id="switch-user-link"
            style="color: var(--text-secondary); font-size: 0.9em; margin-top: 10px; cursor: pointer;">Login as a
            different user</a>
        </div>
      </div>
      <div id="akwaaba-screen"></div>
    </div>
  </div>
  <div id="intro-splash">
    <img src="assets/osmosis-favicon.svg" alt="Osmosis Logo">
    <p>Fun time with science</p>
  </div>

  <script src="core_shared_state.js"></script>
  <script src="index.js"></script>
</body>

</html>
