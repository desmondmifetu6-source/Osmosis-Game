<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Meaning Exposure (Revision)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .l2-card {
      padding: 2rem;
      max-width: 600px;
      margin: auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px dashed var(--text-secondary);
      padding-bottom: 1rem;
      margin-bottom: 1.5rem;
    }

    .header h2 {
      margin: 0;
    }

    .alarming-timer {
      font-size: 2rem;
      font-weight: bold;
      font-family: monospace;
      background: var(--text-main);
      color: var(--surface-white);
      padding: 0.5rem 1rem;
      border-radius: 4px;
      text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
    }

    .revision-list {
      max-height: 50vh;
      overflow-y: auto;
      margin-bottom: 2rem;
      text-align: left;
      padding-right: 1rem;
    }

    .revision-item {
      margin-bottom: 1rem;
      padding: 1rem;
      background: rgba(0, 0, 0, 0.05);
      border-left: 4px solid var(--accent-primary);
      border-radius: 4px;
    }

    .revision-item strong {
      display: block;
      font-size: 1.5rem;
      margin-bottom: 0.3rem;
      color: var(--text-main);
      text-transform: uppercase;
      letter-spacing: 2px;
    }

    .revision-item p {
      margin: 0;
      font-style: italic;
      color: var(--text-secondary);
    }
  </style>
</head>

<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">

    <!-- Transition Container -->
    <div id="transition-container" class="card l2-card" style="text-align: center;">
      <h2><STRong>WELCOME TO LEVEL 2.</STRong> </h2>
      <P style="font-size:1.2rem; margin-bottom:2rem; "> You have 5 minutes to assimilate the
        meaning of all the terms. </P>
      <button id="start-btn" class="classic-btn">Proceed</button>
    </div>

    <!-- Revision Container -->
    <div id="revision-container" class="card l2-card" style="display: none;">
      <div class="header">
        <h2>Revision (5 mins)</h2>
        <div id="rev-timer" class="alarming-timer">05:00</div>
      </div>
      <p style="font-style:italic; margin-bottom:1rem;">Revise the meaning of each word carefully .</p>
      <div id="rev-list" class="revision-list"></div>
      <button id="start-test-btn" class="classic-btn secondary" style="width:auto; float:right;">End Study
        Early</button>
      <div style="clear:both;"></div>
    </div>

  </div>
  <script src="core_dictionary.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="07_stage5_meaning_exposure.js"></script>
</body>

</html>
