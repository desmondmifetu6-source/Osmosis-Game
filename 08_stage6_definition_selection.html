<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Osmosis - Stage 5: Match Terms to Meanings</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Roboto:wght@400;500;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="core_styles.css">
  <style>
    .l2-card {
      padding: 3rem 2.5rem;
      max-width: 800px;
      margin: auto;
      background: rgba(255, 255, 255, 0.25) !important;
      backdrop-filter: blur(15px) !important;
      border: 2px solid rgba(0, 0, 0, 0.2) !important;
      border-radius: 24px !important;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.15) !important;
    }

    .test-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 1.5rem;
      border-bottom: 1px solid rgba(255, 255, 255, 0.3);
      padding-bottom: 1.5rem;
      margin-bottom: 2.5rem;
    }

    .test-header h2 {
      margin: 0;
      font-weight: 700;
      color: var(--text-main);
      letter-spacing: 1px;
    }

    .question-area {
      margin-bottom: 2rem;
      text-align: center;
    }

    .target-word {
      font-size: 1.4rem;
      color: var(--text-main);
      font-weight: 600;
      margin-bottom: 2rem;
      line-height: 1.6;
      padding: 2rem;
      background: rgba(255, 255, 255, 0.4);
      border-radius: 16px;
      border: 2px solid var(--accent-primary);
      text-align: left;
      box-shadow: inset 0 2px 10px rgba(0, 0, 0, 0.05);
    }

    .options-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.25rem;
    }

    .option-btn {
      background: rgba(255, 255, 255, 0.5);
      border: 2px solid rgba(0, 0, 0, 0.15);
      border-radius: 14px;
      padding: 1.25rem;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      color: var(--text-main);
      font-size: 1.3rem;
      font-weight: 700;
      line-height: 1.4;
      font-family: var(--font-main);
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .option-btn:hover {
      background: #ffffff;
      border-color: var(--accent-primary);
      transform: translateY(-3px);
      box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
    }

    .option-btn.correct {
      background: #e8f5e9;
      border-color: #2e7d32;
      color: #1b5e20;
      box-shadow: 0 0 20px rgba(46, 125, 50, 0.2);
    }

    .option-btn.wrong {
      background: #ffebee;
      border-color: #c62828;
      color: #b71c1c;
      box-shadow: 0 0 20px rgba(198, 40, 40, 0.2);
    }

    .feedback {
      height: 2.5rem;
      font-weight: 700;
      margin-top: 1.5rem;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .feedback.success { color: #2e7d32; }
    .feedback.error { color: #c62828; }

    @media (max-width: 480px) {
      .l2-card { padding: 2rem 1.5rem; }
      .target-word { font-size: 1.1rem; padding: 1.5rem; }
      .option-btn { font-size: 1.1rem; padding: 1rem; }
    }


    .floating-point {
      position: absolute;
      color: #4caf50;
      font-weight: bold;
      font-family: monospace;
      font-size: 2rem;
      pointer-events: none;
      animation: floatUp 1s ease-out forwards;
      z-index: 200;
      text-shadow: 1px 1px 2px #000;
    }

    @keyframes floatUp {
      0% {
        opacity: 1;
        transform: translateY(0) scale(1.5);
      }

      100% {
        opacity: 0;
        transform: translateY(-50px) scale(1);
      }
    }
  </style>
</head>

<body>
  <div class="scoreboard" id="scoreboard">Score: <span id="current-score">0</span></div>
  <div class="app-container">

    <!-- Test Container -->
    <div id="test-container" class="card l2-card">
      <div class="test-header">
        <h2>Stage 5: Match Terms to Meanings</h2>
        <div id="test-progress" style="font-size:1.2rem; font-weight:bold;">1 / 26</div>
      </div>
      <div class="question-area">
        <div id="target-word" class="target-word">WORD</div>
        <div id="options-container" class="options-grid"></div>
        <div id="test-feedback" class="feedback"></div>
      </div>
      <button id="next-btn" class="classic-btn blue-gradient" style="display:none; margin: auto;">Next Word</button>
    </div>

  </div>
  <script src="core_dictionary.js"></script>
  <script src="/socket.io/socket.io.js"></script>
  <script src="core_shared_state.js"></script>
  <script src="08_stage6_definition_selection.js"></script>
</body>

</html>
